name: Build and deploy (FastAPI + React) to Azure Web App - CCSE-MIP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "mi-platform/package-lock.json"

      - name: Install frontend deps
        working-directory: mi-platform
        run: npm ci

      - name: Build frontend (use same-origin API)
        working-directory: mi-platform
        env:
          VITE_API_BASE_URL: ""
        run: npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate backend dependencies install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Package app for deployment
        run: |
          rm -rf deploy
          mkdir -p deploy
          cp -R backend deploy/backend
          cp -R mi-platform/dist deploy/mi-platform/dist
          cp requirements.txt deploy/requirements.txt
          cd deploy
          zip -r ../app.zip .

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: app.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-package
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0069D1122707478F9CBA715AC3B5E580 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_905AE399AAF94E049C67EA51360ADD54 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_7349E144309647728EC64E5FB77A6197 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'CCSE-MIP'
          slot-name: 'Production'
          package: app.zip
          